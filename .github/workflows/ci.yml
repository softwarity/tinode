name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: Compile server, init-db, rekey
        # Multiple packages → go build only checks they compile (no binaries written,
        # so no clash with the ./tinode-rekey directory name). The postgres tag is a
        # no-op for the untagged rekey/msgcipher packages.
        run: go build -tags postgres ./server ./tinode-db ./tinode-rekey
      - name: Cipher unit tests
        run: go test ./server/msgcipher/ -v

  cipher-image:
    name: Image · cipher
    needs: test
    if: github.event_name == 'push'
    uses: ./.github/workflows/_docker.yml
    with:
      image: docker.io/softwarity/tinode-postgres-cipher
      file: Dockerfile
      slug: cipher
    secrets: inherit

  rekey-image:
    name: Image · rekey
    needs: test
    if: github.event_name == 'push'
    uses: ./.github/workflows/_docker.yml
    with:
      image: docker.io/softwarity/tinode-postgres-rekey
      file: tinode-rekey/Dockerfile
      slug: rekey
    secrets: inherit
