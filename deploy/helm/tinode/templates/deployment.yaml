apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tinode.fullname" . }}
  labels:
    {{- include "tinode.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "tinode.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tinode.selectorLabels" . | nindent 8 }}
      annotations:
        # Roll the pods when the key ring changes (add/rotate/remove a key).
        checksum/keys: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      containers:
        - name: tinode
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # POSTGRES_DSN + the key ring (TINODE_MSG_KEY_*) come from the Secret.
          envFrom:
            - secretRef:
                name: {{ include "tinode.fullname" . }}-keys
          env:
            - name: RESET_DB
              value: "false"
          ports:
            - name: http
              containerPort: 6060
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
          readinessProbe:
            tcpSocket:
              port: http
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
