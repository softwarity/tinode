# The key ring and DB DSN, shared by the server and the re-key Job. In a real setup
# manage this Secret out of band (sealed-secrets, external-secrets, Vault…) rather
# than from plain values.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tinode.fullname" . }}-keys
  labels:
    {{- include "tinode.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_DSN: {{ .Values.postgres.dsn | quote }}
  TINODE_REKEY_DSN: {{ .Values.postgres.dsn | quote }}
  {{- if .Values.cipher.keys }}
  TINODE_MSG_KEY_CURRENT: {{ .Values.cipher.current | quote }}
  {{- range $id, $key := .Values.cipher.keys }}
  TINODE_MSG_KEY_{{ $id }}: {{ $key | quote }}
  {{- end }}
  {{- end }}
